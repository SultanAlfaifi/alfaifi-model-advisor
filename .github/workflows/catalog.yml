name: Refresh model catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build complete official Ollama index
        env:
          PYTHONPATH: src
        run: python scripts/build_catalog.py

      - name: Commit updated index
        shell: bash
        run: |
          if git diff --quiet -- data/catalog.json; then
            echo "Catalog is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json
          git commit -m "chore: refresh official Ollama catalog"
          git push
