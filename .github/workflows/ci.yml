name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[desktop]"

      - name: Compile source
        run: python -m compileall -q launcher.py desktop_launcher.py src tests

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Import desktop application
        if: matrix.python-version == '3.12'
        run: python -c "import mustakshif.desktop"
