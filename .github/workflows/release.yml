name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-release:
    name: Build and publish Windows release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and build tools
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build desktop and CLI executables
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name Mustakshif --icon .\assets\mustakshif.ico `
            --add-data ".\assets\mustakshif-icon.png;assets" `
            --add-data ".\data\catalog.json;data" `
            --version-file .\version_info.txt .\desktop_launcher.py

          pyinstaller --noconfirm --clean --onefile --console `
            --distpath .\dist\cli `
            --name mustakshif --icon .\assets\mustakshif.ico `
            --add-data ".\data\catalog.json;data" `
            --version-file .\version_info.txt .\launcher.py

      - name: Stage installer inputs and portable package
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $portable = Join-Path $PWD "release\portable"
          New-Item -ItemType Directory -Path $portable -Force | Out-Null

          Copy-Item -LiteralPath .\assets\mustakshif.ico -Destination .\dist\mustakshif.ico
          Copy-Item -LiteralPath .\README.md, .\LICENSE, .\NOTICE, .\TRADEMARKS.md -Destination .\dist

          New-Item -ItemType Directory -Path (Join-Path $portable "cli") -Force | Out-Null
          Copy-Item -LiteralPath .\dist\Mustakshif.exe, .\dist\mustakshif.ico -Destination $portable
          Copy-Item -LiteralPath .\dist\cli\mustakshif.exe -Destination (Join-Path $portable "cli")
          Copy-Item -LiteralPath .\README.md, .\LICENSE, .\NOTICE, .\TRADEMARKS.md -Destination $portable
          Copy-Item -LiteralPath .\scripts\Install-Mustakshif.ps1, .\scripts\Uninstall-Mustakshif.ps1 -Destination $portable

          Compress-Archive -Path "$portable\*" -DestinationPath ".\release\Mustakshif-$version-Windows-x64.zip"
          git archive --format=zip --output=".\release\Mustakshif-$version-Source.zip" HEAD

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build graphical installer
        shell: pwsh
        run: |
          $compiler = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $compiler)) {
            throw "Inno Setup compiler was not found at $compiler"
          }
          & $compiler .\installer\Mustakshif.iss

          $version = $env:RELEASE_TAG.TrimStart('v')
          Copy-Item -LiteralPath ".\dist\Mustakshif-Setup-$version.exe" -Destination .\release

      - name: Create checksums
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath .\release -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content -LiteralPath .\release\SHA256SUMS.txt -Encoding ascii

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $assets = Get-ChildItem -LiteralPath .\release -File | ForEach-Object FullName
          gh release create $env:RELEASE_TAG $assets `
            --verify-tag `
            --title "Mustakshif v$version" `
            --generate-notes
