name: Feature request
description: Propose a focused improvement or new capability.
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, not only the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Hardware detection
        - Model catalog
        - Recommendation scoring
        - Terminal experience
        - Installation and packaging
        - Documentation
        - Other
    validations:
      required: true
